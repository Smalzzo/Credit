services:
  postgres:
    image: postgres:16
    container_name: credit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: credit_monitoring
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d credit_monitoring"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: credit-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/credit_monitoring
      API_BASE_URL: http://api:8000
      PYTHONPATH: /app/src
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: credit-streamlit
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/credit_monitoring
      PYTHONPATH: /app/src
    command:
      - streamlit
      - run
      - monitoring/streamlit_app.py
      - --server.address=0.0.0.0
      - --server.port=8501
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501')\""]
      interval: 30s
      timeout: 5s
      retries: 5
    ports:
      - "8501:8501"
    volumes:
      - ./monitoring:/app/monitoring
      - ./data:/app/data
      - ./reports:/app/reports

volumes:
  pgdata:
